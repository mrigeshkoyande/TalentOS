ai_usage_summary: |
  Gemini (via Antigravity IDE) was used as a pair-programming assistant for:
  - Designing the multi-signal composite scoring model
  - Anomaly/honeypot detection heuristics (zero-duration skills, future certifications,
    experience-title mismatches)
  - Code review and debugging of the Node.js ranker
  No candidate profile data was processed by any remote LLM during ranking.
  The ranking algorithm is entirely deterministic and CPU-only.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based composite ranker implemented in Node.js (rank.cjs). Candidate quality
  is assessed across three weighted signal groups:

  1. EXPERIENCE (30%): Total years of experience with diminishing returns above 12 years.
     Penalizes consulting-only backgrounds. Rewards explicit team-lead and growth-stage tenure.

  2. SKILLS (45%): Skill density score combining skill-count, domain-relevance keywords
     (AI/ML/Data Engineering tier list), and skill-endorsement trust multiplier. Rewards
     specialised and validated technical skills over broad keyword lists. An endorsement-
     and-duration trust multiplier on skills catches lazy keyword stuffing.

  3. BEHAVIORAL SIGNALS (25%): Rewards recent activity, short notice period, open-to-work
     status, recruiter engagement rate, and publication/open-source activity. Penalises
     inactive profiles and implausibly long notice periods.

  Honeypot / anomaly detection filters are applied BEFORE scoring. Candidates with
  zero-duration skill entries, future-dated certifications, impossible experience-age
  ratios, or non-engineering primary roles are excluded entirely.

  Hidden Gems are flagged when a candidate scores in the top quartile on SKILLS+BEHAVIORAL
  but holds fewer than the median number of canonical keyword matches — indicating
  genuine competence masked by unconventional resume language.

  Runtime: ~45 seconds for 100,000 candidates on a consumer laptop CPU.

